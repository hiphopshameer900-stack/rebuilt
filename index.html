<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ammu ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading-screen" class="scene active">
        <div class="loading-box">
            <p id="loading-text">Loading memories...</p>
            <div class="progress-bar"><div id="progress"></div></div>
            <p id="counter">0%</p>
        </div>
    </div>

    <div id="scene-1" class="scene">
        <div class="heart-container">
            <p class="typing-text" id="scene1-text"></p>
            <div class="beating-heart" id="start-button">❤️</div>
        </div>
    </div>

    <div id="scene-2" class="scene">
        <h2 class="scene-title">Our Precious Memories ✨</h2>
        <div class="memory-space">
            <div class="memory-card" style="--delay: 0s;">🌸 Our first smile.</div>
            <div class="memory-card" style="--delay: 2s;">❤️ Our first laugh.</div>
            <div class="memory-card" style="--delay: 4s;">✨ Our first dream.</div>
        </div>
        <button id="to-scene3" class="next-btn">Continue ➔</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
