<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Every Beat of My Heart Chooses You ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Background -->
    <div class="background">
        <div class="stars"></div>
        <div class="hearts"></div>
    </div>

    <!-- Main Container -->
    <div class="container">

        <h2 class="welcome">
            Hi Ammu ❤️
        </h2>

        <h1 class="title">
            Every Beat of My Heart Chooses You
        </h1>

        <p class="typing">
            This isn't just a website...
        </p>

        <p class="typing2">
            It's everything I couldn't say perfectly in words.
        </p>

        <p class="typing3">
            A journey made only for you,
            <span>Suchi Ma ❤️</span>
        </p>

        <button id="startBtn">
            ❤️ Open My Heart ❤️
        </button>

    </div>

    <!-- Floating Hearts -->
    <div class="floating-heart heart1">❤️</div>
    <div class="floating-heart heart2">💖</div>
    <div class="floating-heart heart3">💕</div>
    <div class="floating-heart heart4">💗</div>
    <div class="floating-heart heart5">💞</div>

    <!-- Music -->
    <audio id="bgmusic" loop>
        <source src="music/piano.mp3" type="audio/mpeg">
    </audio>

    <!-- Footer -->
    <footer>
        Made with ❤️ by Shameer
    </footer>

    <script src="script.js"></script>

</body>
</html>
